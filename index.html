<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4Z4K6RVWH7"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Note Enhancer</title>
<style>
  :root {
    --bg: #F7F7F5; --surface: #FFFFFF; --surface-alt: #F0F0ED;
    --border: #E8E8E4; --text: #1A1A1A; --text-secondary: #4A4A4A;
    --text-muted: #999999; --accent: #1D9E75; --accent-light: #E1F5EE;
    --accent-text: #0F6E56; --danger: #A32D2D; --danger-light: #FCEBEB;
    --purple: #3C3489; --purple-light: #EEEDFE; --amber: #E5A020; --amber-light: #FAEEDA;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0F0F0F; --surface: #1A1A1A; --surface-alt: #222222;
      --border: #2E2E2E; --text: #F0F0ED; --text-secondary: #AAAAAA;
      --text-muted: #555555; --accent: #1D9E75; --accent-light: #0D2E22;
      --accent-text: #4ECDA4; --danger: #E05555; --danger-light: #2E1111;
      --purple: #9F9BE8; --purple-light: #1E1C3A; --amber: #F0B429; --amber-light: #2D2000;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 32px; }
  .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .lang-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text); font-family: inherit; }

  .nav { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .nav-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); font-size: 14px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .nav-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); font-weight: 600; }
  .nav-btn:hover:not(.active) { background: var(--surface-alt); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }

  .usage-wrap { margin-bottom: 20px; }
  .usage-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .usage-label { font-size: 12px; color: var(--text-muted); }
  .usage-count { font-size: 12px; font-weight: 600; color: var(--accent); }
  .usage-bar { height: 4px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; }
  .usage-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s; }

  .input-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .input-type-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 8px; cursor: pointer; text-align: center; font-family: inherit; transition: background 0.15s; }
  .input-type-btn:hover { background: var(--surface-alt); }
  .input-type-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .input-type-btn .lbl { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

  .notes-wrap { position: relative; }
  textarea { width: 100%; min-height: 140px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 10px; padding: 14px 14px 32px 14px; font-size: 14px; font-family: inherit; color: var(--text); resize: vertical; outline: none; line-height: 1.6; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }
  .word-count { position: absolute; bottom: 10px; right: 12px; font-size: 11px; color: var(--text-muted); pointer-events: none; }

  .preview-img { width: 100%; max-height: 240px; object-fit: cover; border-radius: 10px; display: block; margin-bottom: 8px; }
  .remove-img { background: none; border: none; color: var(--danger); font-size: 13px; cursor: pointer; font-family: inherit; padding: 4px 0; }

  .subject-row { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
  .subject-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .subject-btn.active { background: var(--amber-light); border-color: var(--amber); color: var(--amber); }

  .count-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
  .count-label { font-size: 12px; color: var(--text-muted); min-width: 80px; }
  .count-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .count-btn.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple); }

  .modes-row { display: flex; gap: 8px; margin: 14px 0; flex-wrap: wrap; }
  .mode-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .mode-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }

  .enhance-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .enhance-btn:hover { opacity: 0.9; }
  .enhance-btn:disabled { opacity: 0.5; cursor: default; }

  .loading-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 20px; margin-bottom: 16px; text-align: center; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--surface-alt); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  .loading-msg { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .loading-sub { font-size: 13px; color: var(--text-muted); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .save-btn { background: var(--accent-light); color: var(--accent-text); border: 1px solid var(--accent); border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 16px; margin-right: 8px; }
  .copy-btn { background: var(--surface-alt); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 8px 18px; font-size: 14px; cursor: pointer; font-family: inherit; margin-bottom: 16px; transition: all 0.15s; }
  .copy-btn:hover { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }

  .section-header { border-left: 3px solid var(--accent); padding-left: 10px; margin-bottom: 14px; }
  .section-header.purple { border-color: var(--purple); }
  .section-header.amber { border-color: var(--amber); }
  .section-title { font-size: 17px; font-weight: 600; color: var(--text); }

  .body-text { font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
  .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .tag { background: var(--accent-light); color: var(--accent-text); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }

  .flashcard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .flashcard { background: var(--purple-light); border: 1px solid var(--border); border-radius: 12px; padding: 16px; min-height: 80px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; transition: background 0.2s; }
  .flashcard.flipped { background: var(--surface-alt); }
  .flashcard-text { font-size: 13px; font-weight: 500; color: var(--purple); line-height: 1.4; }
  .flashcard.flipped .flashcard-text { color: var(--text-secondary); font-weight: 400; }
  .hint { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }

  .quiz-q { margin-bottom: 20px; }
  .quiz-q-text { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
  .quiz-opt { width: 100%; text-align: left; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); color: var(--text-secondary); font-size: 13px; cursor: pointer; font-family: inherit; margin-bottom: 7px; transition: background 0.1s; }
  .quiz-opt:hover:not(:disabled) { background: var(--surface-alt); }
  .quiz-opt.correct { background: var(--accent-light); border-color: var(--accent); color: var(--accent-text); }
  .quiz-opt.wrong { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
  .quiz-score { background: var(--accent-light); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 18px; margin-top: 16px; text-align: center; font-size: 15px; font-weight: 600; color: var(--accent-text); display: none; }

  .ask-ai-wrap { margin-top: 8px; }
  .ask-ai-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .ask-ai-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--surface-alt); color: var(--text); outline: none; }
  .ask-ai-input:focus { border-color: var(--accent); }
  .ask-ai-btn { padding: 10px 18px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .ask-ai-btn:disabled { opacity: 0.5; cursor: default; }
  .ask-ai-response { margin-top: 12px; padding: 14px; background: var(--surface-alt); border-radius: 10px; font-size: 14px; line-height: 1.7; color: var(--text-secondary); display: none; }

  .saved-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .saved-card:hover { background: var(--surface-alt); }
  .saved-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .saved-info { flex: 1; }
  .saved-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .saved-meta { font-size: 12px; color: var(--text-muted); }
  .delete-btn { background: var(--danger-light); color: var(--danger); border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 500; flex-shrink: 0; }

  .empty { text-align: center; padding: 60px 20px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 14px; color: var(--text-muted); }

  .home-badge { display: inline-block; background: var(--accent-light); color: var(--accent-text); font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px; margin-bottom: 20px; }
  .home-title { font-size: 52px; font-weight: 700; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 16px; }
  .home-title span { color: var(--accent); }
  .home-subtitle { font-size: 17px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 36px; max-width: 480px; }
  .feature-row { display: flex; gap: 10px; margin-bottom: 36px; flex-wrap: wrap; }
  .feature-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; text-align: center; min-width: 80px; }
  .feature-chip .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .feature-chip .lbl { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .primary-btn { display: block; width: 100%; max-width: 320px; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 12px; text-align: center; transition: opacity 0.15s; }
  .primary-btn:hover { opacity: 0.9; }
  .secondary-btn { display: block; width: 100%; max-width: 320px; padding: 18px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: inherit; text-align: center; transition: background 0.15s; margin-bottom: 12px; }
  .secondary-btn:hover { background: var(--surface-alt); }

  .recent-section { margin-bottom: 32px; }
  .recent-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 12px; text-transform: uppercase; }
  .recent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 10px; }
  .recent-card:hover { background: var(--surface-alt); }
  .recent-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .recent-info { flex: 1; }
  .recent-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .recent-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--surface); border-radius: 20px; padding: 32px; max-width: 480px; width: 100%; border: 1px solid var(--border); }
  .modal-icon { font-size: 40px; text-align: center; margin-bottom: 16px; }
  .modal-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; text-align: center; }
  .modal-subtitle { font-size: 15px; color: var(--text-secondary); text-align: center; line-height: 1.6; margin-bottom: 24px; }
  .modal-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--surface-alt); color: var(--text); outline: none; margin-bottom: 10px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-bottom: 10px; transition: opacity 0.15s; }
  .modal-btn:hover { opacity: 0.9; }
  .modal-btn.secondary { background: var(--surface-alt); color: var(--text); border: 1px solid var(--border); }
  .modal-divider { text-align: center; font-size: 13px; color: var(--text-muted); margin: 16px 0; }
  .modal-feedback-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 10px; }

  #file-input, #image-input { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Note <span>Enhancer</span></div>
    <button class="lang-btn" onclick="toggleLang()" id="lang-btn">日本語</button>
  </div>

  <!-- HOME -->
  <div id="home-screen">
    <div class="nav">
      <button class="nav-btn active" id="nav-home" onclick="showScreen('home')"></button>
      <button class="nav-btn" id="nav-saved" onclick="showScreen('saved')"></button>
    </div>
    <div class="home-badge" id="home-badge"></div>
    <h1 class="home-title">Note<br><span>Enhancer</span></h1>
    <p class="home-subtitle" id="home-subtitle"></p>
    <div class="feature-row">
      <div class="feature-chip"><span class="icon">🖼️</span><span class="lbl" id="feat-photo"></span></div>
      <div class="feature-chip"><span class="icon">📄</span><span class="lbl" id="feat-file"></span></div>
      <div class="feature-chip"><span class="icon">✍️</span><span class="lbl" id="feat-text"></span></div>
      <div class="feature-chip"><span class="icon">🤖</span><span class="lbl" id="feat-ai"></span></div>
    </div>
    <div class="recent-section" id="recent-section" style="display:none">
      <div class="recent-title" id="recent-title"></div>
      <div id="recent-list"></div>
    </div>
    <button class="primary-btn" id="btn-new" onclick="showScreen('enhance'); newNote()"></button>
    <button class="secondary-btn" id="btn-saved" onclick="showScreen('saved')"></button>
  </div>

  <!-- ENHANCE -->
  <div id="enhance-screen" style="display:none">
    <div class="nav">
      <button class="nav-btn" onclick="showScreen('home')" id="nav-back"></button>
      <button class="nav-btn active" id="nav-enhance-label"></button>
    </div>

    <div class="usage-wrap">
      <div class="usage-top">
        <span class="usage-label" id="usage-label"></span>
        <span class="usage-count" id="usage-count"></span>
      </div>
      <div class="usage-bar"><div class="usage-fill" id="usage-fill"></div></div>
    </div>

    <div class="input-row">
      <button class="input-type-btn" onclick="document.getElementById('image-input').click()">
        <span class="icon">🖼️</span><span class="lbl" id="btn-photo"></span>
      </button>
      <button class="input-type-btn" onclick="document.getElementById('file-input').click()">
        <span class="icon">📄</span><span class="lbl" id="btn-file"></span>
      </button>
    </div>
    <input type="file" id="image-input" accept="image/*" onchange="handleImage(event)" />
    <input type="file" id="file-input" accept=".txt" onchange="handleFile(event)" />

    <div class="card">
      <div class="card-label" id="label-notes"></div>
      <div id="image-preview" style="display:none">
        <img id="preview-img" class="preview-img" src="" alt="preview" />
        <button class="remove-img" onclick="removeImage()" id="btn-remove-img"></button>
      </div>
      <div class="notes-wrap" id="notes-wrap">
        <textarea id="notes-input" oninput="updateWordCount()" rows="6"></textarea>
        <span class="word-count" id="word-count">0</span>
      </div>

      <div class="card-label" style="margin-top:16px" id="label-subject"></div>
      <div class="subject-row" id="subject-row"></div>

      <div class="modes-row">
        <button class="mode-btn active" data-mode="summary" onclick="toggleMode(this)" id="mode-summary"></button>
        <button class="mode-btn active" data-mode="flashcards" onclick="toggleMode(this)" id="mode-flashcards"></button>
        <button class="mode-btn active" data-mode="quiz" onclick="toggleMode(this)" id="mode-quiz"></button>
      </div>

      <div class="count-row" id="fc-count-row">
        <span class="count-label" id="fc-label"></span>
        <button class="count-btn active" data-fc="3" onclick="setFcCount(this)">3</button>
        <button class="count-btn" data-fc="5" onclick="setFcCount(this)">5</button>
        <button class="count-btn" data-fc="10" onclick="setFcCount(this)">10</button>
      </div>

      <div class="count-row" id="quiz-count-row">
        <span class="count-label" id="quiz-label"></span>
        <button class="count-btn active" data-qz="5" onclick="setQzCount(this)">5</button>
        <button class="count-btn" data-qz="10" onclick="setQzCount(this)">10</button>
        <button class="count-btn" data-qz="20" onclick="setQzCount(this)">20</button>
      </div>

      <button class="enhance-btn" id="enhance-btn" onclick="enhance()"></button>
    </div>

    <div id="loading-area" style="display:none">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <div class="loading-msg" id="loading-msg"></div>
        <div class="loading-sub" id="loading-sub"></div>
      </div>
    </div>

    <div id="results"></div>
  </div>

  <!-- SAVED -->
  <div id="saved-screen" style="display:none">
    <div class="nav">
      <button class="nav-btn" onclick="showScreen('home')" id="nav-back-saved"></button>
      <button class="nav-btn active" id="nav-saved-label"></button>
    </div>
    <div id="saved-list"></div>
  </div>
</div>

<!-- LIMIT MODAL -->
<div class="modal-overlay" id="limit-modal" style="display:none">
  <div class="modal">
    <div class="modal-icon">🔒</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <input class="modal-input" type="email" id="waitlist-email" />
    <button class="modal-btn" id="modal-join-btn" onclick="joinWaitlist()"></button>
    <div class="modal-divider" id="modal-divider"></div>
    <div class="modal-feedback-title" id="modal-feedback-title"></div>
    <select class="modal-input" id="feedback-type">
      <option value="idea" id="fb-idea"></option>
      <option value="bug" id="fb-bug"></option>
      <option value="other" id="fb-other"></option>
    </select>
    <textarea class="modal-input" id="feedback-text" rows="3"></textarea>
    <button class="modal-btn" id="modal-feedback-btn" onclick="sendFeedback()"></button>
    <button class="modal-btn secondary" id="modal-close-btn" onclick="closeModal()"></button>
  </div>
</div>

<script>
const BACKEND = 'https://note-enhancer-backend.vercel.app/api/enhance';
const MAX_USES = 3;
const EMAIL = 'omarnourelden3@gmail.com';

let lang = navigator.language.startsWith('ja') ? 'ja' : 'en';
let fcCount = 3;
let qzCount = 5;
let currentImage = null;
let savedNotes = JSON.parse(localStorage.getItem('saved_notes') || '[]');
let usageCount = parseInt(localStorage.getItem('usage_count') || '0');
let currentData = null;
let currentNotes = '';
let quizAnswered = {};
let quizTotal = 0;

const T = {
  en: {
    badge: 'AI-powered study tool',
    subtitle: 'Transform lecture notes into summaries, flashcards & quizzes — instantly.',
    navHome: 'Home', navSaved: 'Saved', navBack: '← Home', navEnhance: 'New Note',
    navSavedLabel: 'Saved Notes', navBackSaved: '← Home',
    btnNew: '+ New Note', btnSaved: 'Saved Notes',
    featPhoto: 'Photos', featFile: 'Files', featText: 'Text', featAI: 'AI',
    recentTitle: 'Recently Used',
    usageLabel: 'Free uses remaining',

  const val = T[lang][key];
  return typeof val === 'function' ? val(...args) : val;
}

function updateWordCount() {
  const words = document.getElementById('notes-input').value.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('word-count').textContent = t('wordCount', words);
}

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentImage = ev.target.result;
    document.getElementById('preview-img').src = currentImage;
    document.getElementById('image-preview').style.display = 'block';
    document.getElementById('notes-wrap').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { document.getElementById('notes-input').value = ev.target.result; updateWordCount(); };
  reader.readAsText(file);
}

function removeImage() {
  currentImage = null;
  document.getElementById('image-preview').style.display = 'none';
  document.getElementById('notes-wrap').style.display = 'block';
  document.getElementById('image-input').value = '';
}

let loadingInterval = null;
function startLoadingMessages() {
  const msgs = t('loadingMsgs');
  let i = 0;
  document.getElementById('loading-msg').textContent = msgs[0][0];
  document.getElementById('loading-sub').textContent = msgs[0][1];
  loadingInterval = setInterval(() => {
    i = (i + 1) % msgs.length;
    document.getElementById('loading-msg').textContent = msgs[i][0];
    document.getElementById('loading-sub').textContent = msgs[i][1];
  }, 2000);
}
function stopLoadingMessages() {
  clearInterval(loadingInterval);
}

async function enhance() {
  const notes = document.getElementById('notes-input').value.trim();
  if (!notes && !currentImage) { alert(lang === 'ja' ? 'ノートか画像を追加してください！' : 'Please add notes or an image first!'); return; }

  if (usageCount >= MAX_USES) { showModal(); return; }

  const activeModes = [...document.querySelectorAll('.mode-btn.active')].map(b => b.dataset.mode);
  if (!activeModes.length) { alert(lang === 'ja' ? '出力タイプを選択してください。' : 'Please select at least one output type.'); return; }

  const btn = document.getElementById('enhance-btn');
  btn.disabled = true;
  document.getElementById('results').innerHTML = '';
  document.getElementById('loading-area').style.display = 'block';
  startLoadingMessages();

  const modeInstructions = [];
  if (activeModes.includes('summary')) modeInstructions.push(`A "summary" object with: "text" (3-5 sentence summary), "concepts" (array of 4-6 short key concept strings, max 3 words each).`);
  if (activeModes.includes('flashcards')) modeInstructions.push(`A "flashcards" array of exactly ${fcCount} objects. Each with "term" (1-4 words max) and "definition" (one simple sentence, max 12 words). Keep both extremely short and simple.`);
  if (activeModes.includes('quiz')) modeInstructions.push(`A "quiz" array of exactly ${qzCount} objects, each with "question", "options" (array of 4 strings), "answer" (0-indexed integer).`);

  const instruction = `You are a study assistant. Generate ONLY a JSON object (no markdown) with:\n${modeInstructions.join('\n')}`;

  try {
    let messageContent;
    if (currentImage) {
      const base64 = currentImage.replace(/^data:image\/\w+;base64,/, '');
      const mime = currentImage.match(/data:([^;]+)/)[1];
      messageContent = [
        { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
        { type: 'text', text: instruction }
      ];
    } else {
      messageContent = [{ type: 'text', text: `${instruction}\n\nNotes:\n${notes}` }];
    }

    const res = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2000, messages: [{ role: 'user', content: messageContent }] })
    });

    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());

    usageCount++;
    localStorage.setItem('usage_count', usageCount);
    updateUsageUI();

    currentData = parsed;
    currentNotes = notes;
    quizAnswered = {};
    quizTotal = parsed.quiz?.length || 0;

    stopLoadingMessages();
    document.getElementById('loading-area').style.display = 'none';
    renderResults(parsed, notes);
  } catch(e) {
    stopLoadingMessages();
    document.getElementById('loading-area').style.display = 'none';
    alert('Something went wrong: ' + e);
  }

  btn.disabled = false;
  btn.textContent = t('enhanceBtn');
}

function renderResults(data, notes) {
  const el = document.getElementById('results');
  el.innerHTML = '';

  const actionRow = document.createElement('div');
  actionRow.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'save-btn';
  saveBtn.textContent = t('saveBtn');
  saveBtn.onclick = () => saveNote(notes, data);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = t('copyBtn');
  copyBtn.onclick = () => {
    if (data.summary) {
      navigator.clipboard.writeText(data.summary.text);
      copyBtn.textContent = t('copiedBtn');
      setTimeout(() => copyBtn.textContent = t('copyBtn'), 2000);
    }
  };

  actionRow.appendChild(saveBtn);
  if (data.summary) actionRow.appendChild(copyBtn);
  el.appendChild(actionRow);

  if (data.summary) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="section-header"><div class="section-title">${t('summaryTitle')}</div></div>
      <p class="body-text">${data.summary.text}</p>
      <div class="tags-row">${(data.summary.concepts || []).map(c => `<span class="tag">${c}</span>`).join('')}</div>`;
    el.appendChild(card);
  }

  if (data.flashcards?.length) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="section-header purple"><div class="section-title">${t('flashcardsTitle')}</div></div>
      <p class="hint">${t('flipHint')}</p>
      <div class="flashcard-grid">
        ${data.flashcards.map(fc => `
          <div class="flashcard" data-term="${fc.term}" data-def="${fc.definition}">
            <span class="flashcard-text">${fc.term}</span>
          </div>`).join('')}
      </div>`;
    card.querySelectorAll('.flashcard').forEach(fc => {
      fc.addEventListener('click', function() {
        this.classList.toggle('flipped');
        this.querySelector('.flashcard-text').textContent = this.classList.contains('flipped') ? this.dataset.def : this.dataset.term;
      });
    });
    el.appendChild(card);
  }

  if (data.quiz?.length) {
    const card = document.createElement('div');
    card.className = 'card';
    const scoreId = 'quiz-score-' + Date.now();
    let quizHTML = `<div class="section-header amber"><div class="section-title">${t('quizTitle')}</div></div>`;
    data.quiz.forEach((q, qi) => {
      quizHTML += `<div class="quiz-q"><p class="quiz-q-text">${qi + 1}. ${q.question}</p>`;
      q.options.forEach((opt, oi) => {
        quizHTML += `<button class="quiz-opt" data-qi="${qi}" data-oi="${oi}" data-correct="${q.answer}" data-score="${scoreId}" onclick="answerQuiz(this)">${opt}</button>`;
      });
      quizHTML += `</div>`;
    });
    quizHTML += `<div class="quiz-score" id="${scoreId}"></div>`;
    card.innerHTML = quizHTML;
    el.appendChild(card);
  }

  // Ask AI
  const askCard = document.createElement('div');
  askCard.className = 'card ask-ai-wrap';
  askCard.innerHTML = `
    <div class="section-header" style="border-color:#E5A020"><div class="section-title">${t('askTitle')}</div></div>
    <div class="ask-ai-input-row">
      <input class="ask-ai-input" id="ask-input" placeholder="${t('askPlaceholder')}" onkeydown="handleAskEnter(event)" />
      <button class="ask-ai-btn" id="ask-btn" onclick="askAI()">${t('askBtn')}</button>
    </div>
    <div class="ask-ai-response" id="ask-response"></div>`;
  el.appendChild(askCard);
// Waitlist banner
  const remaining = Math.max(0, MAX_USES - usageCount);
  const banner = document.createElement('div');
  banner.style.cssText = `
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 16px 20px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  `;
  banner.innerHTML = `
    <div>
      <div style="font-size:14px;font-weight:600;color:var(--accent-text)">
        ${lang === 'ja' ? `残り ${remaining} 回の無料使用` : `${remaining} free use${remaining === 1 ? '' : 's'} remaining`}
      </div>
      <div style="font-size:12px;color:var(--accent-text);opacity:0.8;margin-top:2px">
        ${lang === 'ja' ? '気に入りましたか？ウェイトリストに登録して無制限アクセスを。' : 'Enjoying it? Join the waitlist for unlimited access.'}
      </div>
    </div>
    <button onclick="showModal()" style="
      background:var(--accent);
      color:white;
      border:none;
      border-radius:10px;
      padding:8px 16px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      font-family:inherit;
      white-space:nowrap;
    ">${lang === 'ja' ? '登録する →' : 'Join waitlist →'}</button>
  `;
  el.appendChild(banner);  
}

function answerQuiz(btn) {
  const qi = btn.dataset.qi;
  const oi = parseInt(btn.dataset.oi);
  const correct = parseInt(btn.dataset.correct);
  const scoreId = btn.dataset.score;
  document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`).forEach(b => b.disabled = true);
  document.querySelectorAll(`.quiz-opt[data-qi="${qi}"][data-oi="${correct}"]`)[0].classList.add('correct');
  if (oi !== correct) btn.classList.add('wrong');

  if (!quizAnswered[qi]) {
    quizAnswered[qi] = oi === correct;
  }

  if (Object.keys(quizAnswered).length === quizTotal) {
    const correct_count = Object.values(quizAnswered).filter(Boolean).length;
    const scoreEl = document.getElementById(scoreId);
    if (scoreEl) {
      scoreEl.textContent = t('score', correct_count, quizTotal);
      scoreEl.style.display = 'block';
    }
  }
}
function handleAskEnter(e) {
  if (e.key === 'Enter' && !e.isComposing) askAI();
}
async function askAI() {
  const input = document.getElementById('ask-input');
  const question = input.value.trim();
  if (!question) return;
  const btn = document.getElementById('ask-btn');
  const responseEl = document.getElementById('ask-response');
  btn.disabled = true;
  btn.textContent = '...';
  responseEl.style.display = 'block';
  responseEl.textContent = lang === 'ja' ? '考え中...' : 'Thinking...';

  try {
    const context = currentNotes ? `Context from notes:\n${currentNotes}\n\n` : '';
    const res = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 500,
        messages: [{ role: 'user', content: `${context}Student question: ${question}\n\nAnswer simply and clearly in ${lang === 'ja' ? 'Japanese' : 'English'}, in 2-3 sentences max.` }]
      })
    });
    const data = await res.json();
    responseEl.textContent = (data.content || []).map(b => b.text || '').join('');
    input.value = '';
  } catch(e) {
    responseEl.textContent = lang === 'ja' ? 'エラーが発生しました。' : 'Something went wrong.';
  }
  btn.disabled = false;
  btn.textContent = t('askBtn');
}

function saveNote(notes, data) {
  const subject = document.querySelector('.subject-btn.active')?.textContent || '';
  const note = {
    id: Date.now().toString(),
    title: notes.trim().split('\n')[0].slice(0, 40) || 'Image note',
    subject, notes, ...data,
    date: new Date().toLocaleDateString()
  };
  savedNotes = [note, ...savedNotes];
  localStorage.setItem('saved_notes', JSON.stringify(savedNotes));
  document.getElementById('nav-saved').textContent = `${t('navSaved')} (${savedNotes.length})`;
  document.getElementById('btn-saved').textContent = `${t('btnSaved')} (${savedNotes.length})`;
  alert(lang === 'ja' ? '保存しました！' : 'Note saved!');
}

function renderSaved() {
  const el = document.getElementById('saved-list');
  if (!savedNotes.length) {
    el.innerHTML = `<div class="empty"><h3>${t('savedEmpty')}</h3><p>${t('savedEmptySub')}</p></div>`;
    return;
  }
  el.innerHTML = savedNotes.map(n => `
    <div class="saved-card" onclick="loadNote('${n.id}')">
      <div class="saved-dot"></div>
      <div class="saved-info">
        <div class="saved-title">${n.title}</div>
        <div class="saved-meta">${n.subject ? n.subject + ' · ' : ''}${n.date}</div>
      </div>
      <button class="delete-btn" onclick="event.stopPropagation(); deleteNote('${n.id}')">${lang === 'ja' ? '削除' : 'Delete'}</button>
    </div>`).join('');
}

function renderRecent() {
  const recent = savedNotes.slice(0, 3);
  const section = document.getElementById('recent-section');
  const list = document.getElementById('recent-list');
  if (!recent.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = recent.map(n => `
    <div class="recent-card" onclick="loadNote('${n.id}')">
      <div class="recent-dot"></div>
      <div class="recent-info">
        <div class="recent-name">${n.title}</div>
        <div class="recent-sub">${n.subject ? n.subject + ' · ' : ''}${n.date}</div>
      </div>
    </div>`).join('');
}

function loadNote(id) {
  const note = savedNotes.find(n => n.id === id);
  if (!note) return;
  document.getElementById('notes-input').value = note.notes || '';
  updateWordCount();
  showScreen('enhance');
  if (note.summary || note.flashcards || note.quiz) {
    currentData = note; currentNotes = note.notes || '';
    quizAnswered = {}; quizTotal = note.quiz?.length || 0;
    renderResults(note, note.notes || '');
  }
}

function deleteNote(id) {
  if (!confirm(t('deleteConfirm'))) return;
  savedNotes = savedNotes.filter(n => n.id !== id);
  localStorage.setItem('saved_notes', JSON.stringify(savedNotes));
  renderSaved();
  renderRecent();
}

function showModal() { document.getElementById('limit-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('limit-modal').style.display = 'none'; }

function joinWaitlist() {
  const email = document.getElementById('waitlist-email').value.trim();
  if (!email) { alert(lang === 'ja' ? 'メールアドレスを入力してください。' : 'Please enter your email.'); return; }
  window.location.href = `mailto:${EMAIL}?subject=Note Enhancer Waitlist&body=Please add me to the waitlist: ${email}`;
  closeModal();
}

function sendFeedback() {
  const type = document.getElementById('feedback-type').value;
  const text = document.getElementById('feedback-text').value.trim();
  if (!text) { alert(lang === 'ja' ? 'フィードバックを入力してください。' : 'Please enter your feedback.'); return; }
  const subject = `Note Enhancer Feedback: ${type}`;
  window.location.href = `mailto:${EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`;
  closeModal();
}

applyLang();
</script>
</body>
</html>
